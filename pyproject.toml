[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openenv-search_env"
version = "0.1.0"
description = "Search Env environment for OpenEnv"
requires-python = ">=3.10"
dependencies = [
    # Core OpenEnv runtime (provides FastAPI server + HTTP client types)
    # install from github
    # "openenv-core[core] @ git+https://github.com/meta-pytorch/OpenEnv.git",
    "openenv-core[core]>=0.2.2",
    "openai>=1.0.0",
    "python-dotenv>=1.0.0",
    # Environment-specific dependencies
    # HTML content extraction for web search
    "trafilatura>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
]

[project.scripts]
# Server entry point - enables running via: uv run --project . server
# or: python -m search_env.server.app
server = "search_env.server.app:main"
inference = "search_env.inference:cli"

[tool.setuptools]
include-package-data = true
packages = ["search_env", "search_env.server"]
package-dir = { "search_env" = ".", "search_env.server" = "server" }